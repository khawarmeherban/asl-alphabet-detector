# Netlify configuration for the ASL web frontend
# Deploys the React app in `asl-web-app/frontend` and points it at the live Hugging Face backend.

[build]
  base = "asl-web-app/frontend"
  command = "npm run build"
  publish = "build"

  [build.environment]
    NODE_VERSION = "18"
    NPM_VERSION = "9"
    REACT_APP_API_URL = "https://khawar26-asl-backend.hf.space"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(self), microphone=(self), geolocation=()"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
